<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZERO STUDIO | 作品档案</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Noto+Sans+SC:wght@900&display=swap');
        
        body { 
            background-color: #161a21; 
            color: #eef0f4; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden; 
            -webkit-font-smoothing: antialiased; 
        }

        /* 强制硬件加速：解决 Safari 放大后的“细线”和锯齿 */
        .safe-layer {
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            -webkit-transform: translate3d(0, 0, 0);
            transform: translate3d(0, 0, 0);
            outline: 1px solid transparent; /* 消除边缘锯齿的关键 */
        }

        header {
            position: relative;
            z-index: 10000;
        }

        .font-heavy { 
            font-family: 'Montserrat', 'Noto Sans SC', sans-serif; 
            font-weight: 900; 
        }

        /* 隐藏滚动条但保留功能 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #161a21; }
        ::-webkit-scrollbar-thumb { background: #2d343f; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-12">
    
    <div class="max-w-7xl mx-auto">
        <header class="mb-12 flex justify-between items-end border-b border-white/10 pb-8 px-4">
            <div>
                <a href="index.html" class="text-[#8b92a5] text-sm hover:text-white mb-4 transition-colors inline-flex items-center">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                    </svg>
                    返回首页
                </a>
                <h1 class="text-4xl md:text-5xl font-heavy tracking-widest uppercase italic">个人作品全档</h1>
                <p class="text-[#6fa8a5] mt-2 tracking-[0.3em] text-xs font-bold">PORTFOLIO ARCHIVE</p>
            </div>
            <div class="hidden md:block text-right">
                <p class="text-[#8b92a5] text-xs uppercase tracking-widest">SELECTED WORKS</p>
                <p class="text-white/20 text-xs mt-1">© 2026 ZERO STUDIO</p>
            </div>
        </header>

        <div id="full-gallery" class="flex flex-row gap-6 md:gap-8 items-start w-full px-2">
            <div class="w-full py-40 text-center">
                <div class="inline-block w-8 h-8 border-2 border-[#6fa8a5] border-t-transparent rounded-full animate-spin"></div>
            </div>
        </div>

        <div id="scroll-trigger" class="w-full h-20 flex items-center justify-center">
            <div id="loading-dots" class="hidden text-[#6fa8a5] opacity-50 tracking-widest text-xs uppercase">
                Loading More...
            </div>
        </div>
    </div>

    <script>
        // 配置参数
        const BATCH_SIZE = 12; // 每批加载12张图片，保护带宽
        let allPhotos = [];
        let displayedCount = 0;
        const container = document.getElementById('full-gallery');
        const trigger = document.getElementById('scroll-trigger');
        const loader = document.getElementById('loading-dots');

        // 获取列数
        const getColCount = () => {
            if (window.innerWidth >= 1280) return 4;
            if (window.innerWidth >= 1024) return 3;
            if (window.innerWidth >= 768) return 2;
            return 1;
        };

        // 核心渲染逻辑
        const renderGallery = (isReset = false) => {
            const colCount = getColCount();
            
            if (isReset) {
                container.innerHTML = Array.from({ length: colCount }, () => 
                    `<div class="flex flex-col gap-8 flex-1 w-full min-w-0 masonry-column"></div>`
                ).join('');
                displayedCount = 0;
            }

            const columns = container.querySelectorAll('.masonry-column');
            const nextBatch = allPhotos.slice(displayedCount, displayedCount + BATCH_SIZE);

            nextBatch.forEach((p, index) => {
                const card = `
                    <div class="group cursor-pointer relative z-10 hover:z-[9999] safe-layer">
                        <div class="relative transition-all duration-500 ease-[cubic-bezier(0.23,1,0.32,1)] 
                                    group-hover:scale-[1.3] group-hover:-translate-y-2 
                                    group-hover:shadow-[0_40px_80px_rgba(0,0,0,0.8)] 
                                    rounded-2xl bg-[#1a1f26] overflow-hidden">
                            
                            <img src="${p.url}" 
                                 loading="lazy" 
                                 decoding="async" 
                                 class="w-full h-auto block rounded-2xl border border-white/5 relative z-10" 
                                 alt="${p.title}">
                            
                            <div class="absolute inset-0 z-20 bg-gradient-to-t from-black/90 via-black/20 to-transparent 
                                        opacity-0 group-hover:opacity-100 transition-opacity duration-300 
                                        flex flex-col justify-end p-6 pointer-events-none">
                                <span class="inline-block self-start text-[10px] text-[#e2bac8] border border-[#e2bac8]/40 
                                             px-2 py-0.5 rounded uppercase tracking-widest mb-2 bg-black/60">
                                    ${p.category}
                                </span>
                                <h3 class="text-white font-bold text-lg tracking-wider truncate">${p.title}</h3>
                                <div class="w-0 group-hover:w-full h-[1px] bg-[#6fa8a5]/50 mt-2 transition-all duration-700"></div>
                            </div>
                        </div>
                    </div>
                `;
                // 简单的轮询分配，确保各列平衡
                columns[(displayedCount + index) % colCount].insertAdjacentHTML('beforeend', card);
            });

            displayedCount += nextBatch.length;
            
            // 如果全部加载完了，隐藏触发器
            if (displayedCount >= allPhotos.length) {
                trigger.classList.add('hidden');
            }
        };

        // 获取数据
        fetch('/api/photos')
            .then(res => res.json())
            .then(data => {
                allPhotos = data.filter(p => p.display_location === '个人档案' || p.display_location === '双端展示');
                
                if (allPhotos.length === 0) {
                    container.innerHTML = '<div class="w-full py-20 text-center text-gray-500 italic">尚无作品档案</div>';
                    return;
                }

                // 首次渲染
                renderGallery(true);

                // 无限滚动监听
                const observer = new IntersectionObserver((entries) => {
                    if (entries[0].isIntersecting && displayedCount < allPhotos.length) {
                        loader.classList.remove('hidden');
                        setTimeout(() => {
                            renderGallery(false);
                            loader.classList.add('hidden');
                        }, 400); // 增加一点点延迟让加载更自然
                    }
                }, { rootMargin: '300px' });

                observer.observe(trigger);
            })
            .catch(err => {
                console.error('Data loading error:', err);
                container.innerHTML = '<div class="w-full py-20 text-center text-red-500">加载失败，请刷新重试</div>';
            });

        // 窗口大小调整处理（防抖）
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                const currentTotal = displayedCount;
                renderGallery(true); // 重置容器
                // 将之前已经显示的图片一次性重新分配
                const originalBatchSize = BATCH_SIZE;
                const totalToRestore = currentTotal;
                displayedCount = 0;
                
                // 暂时调大 batch size 来恢复之前的图片
                const restorePhotos = allPhotos.slice(0, totalToRestore);
                const colCount = getColCount();
                const columns = container.querySelectorAll('.masonry-column');
                
                restorePhotos.forEach((p, index) => {
                    const card = `
                        <div class="group cursor-pointer relative z-10 hover:z-[9999] safe-layer">
                            <div class="relative transition-all duration-500 ease-[cubic-bezier(0.23,1,0.32,1)] group-hover:scale-[1.3] group-hover:-translate-y-2 group-hover:shadow-[0_40px_80px_rgba(0,0,0,0.8)] rounded-2xl bg-[#1a1f26]">
                                <img src="${p.url}" loading="lazy" decoding="async" class="w-full h-auto block rounded-2xl border border-white/5 relative z-10">
                                <div class="absolute inset-0 z-20 bg-gradient-to-t from-black/90 via-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-6 pointer-events-none">
                                    <span class="inline-block self-start text-[10px] text-[#e2bac8] border border-[#e2bac8]/40 px-2 py-0.5 rounded uppercase tracking-widest mb-2 bg-black/60">${p.category}</span>
                                    <h3 class="text-white font-bold text-lg tracking-wider truncate">${p.title}</h3>
                                </div>
                            </div>
                        </div>
                    `;
                    columns[index % colCount].insertAdjacentHTML('beforeend', card);
                });
                displayedCount = totalToRestore;
            }, 300);
        });
    </script>
</body>
</html>
